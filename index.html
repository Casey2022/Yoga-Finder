<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yo-Go — Local Yoga Class Calendar</title>

  <!-- Favicon: use the logo -->
  <link rel="icon" type="image/png" href="assets/yogo-logo.png"/>
  <link rel="apple-touch-icon" href="assets/yogo-logo.png"/>

  <!-- FullCalendar: renders the Google Calendar-style view -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Cormorant Garamond: elegant serif for headings -->
  <!-- Jost: clean geometric sans for body -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design System ─────────────────────────────────────────── */
    :root {
      --bg:          #f5f0e8;
      --bg-card:     #fdfaf4;
      --bg-dark:     #2c2416;
      --clay:        #c17a5c;
      --clay-light:  #e8c4aa;
      --sage:        #7a9e7e;
      --sage-light:  #b8d4ba;
      --ink:         #2c2416;
      --ink-mid:     #6b5c47;
      --ink-soft:    #a0907a;
      --border:      #ddd4c0;
      --shadow:      rgba(44, 36, 22, 0.08);
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'Jost', sans-serif;
      --radius:       12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Noise texture overlay ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--bg-dark);
      color: #f5f0e8;
      padding: 2.5rem 3rem 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .header-logo {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      /* The logo has a light background; on dark header we add subtle glow */
      background: #faf6ee;
      border-radius: 50%;
      padding: 4px;
      object-fit: contain;
    }

    .header-brand h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header-brand h1 em {
      font-style: italic;
      color: var(--clay-light);
    }

    .header-brand p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .last-updated {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--ink-soft);
      letter-spacing: 0.06em;
      text-align: right;
    }

    /* ── Studio filter pills ────────────────────────────────────── */
    .filter-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-soft);
      margin-right: 0.25rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 400;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.18s ease;
      user-select: none;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pill.active {
      border-color: currentColor;
    }

    .pill:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    /* ── Main layout ────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      min-height: calc(100vh - 130px);
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
    }

    .sidebar-section-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-soft);
      margin-bottom: 0.75rem;
      margin-top: 1.25rem;
    }

    .sidebar-section-title:first-child {
      margin-top: 0;
    }

    /* Today's classes list */
    .class-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .class-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      border-left: 3px solid var(--clay);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .class-card:hover {
      transform: translateX(2px);
      box-shadow: 2px 4px 12px var(--shadow);
    }

    .class-card-name {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .class-card-meta {
      margin-top: 0.3rem;
      font-size: 0.72rem;
      color: var(--ink-mid);
      font-weight: 300;
    }

    .class-card-spots {
      display: inline-block;
      margin-top: 0.3rem;
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: var(--sage-light);
      color: var(--sage);
      font-weight: 500;
    }

    .class-card-spots.few {
      background: #fde8d8;
      color: var(--clay);
    }

    /* Level badges */
    .level-badge {
      display: inline-block;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      margin-left: 0.3rem;
      background: var(--border);
      color: var(--ink-soft);
    }

    /* ── Calendar pane ──────────────────────────────────────────── */
    .calendar-pane {
      padding: 1.5rem 2rem;
    }

    /* Override FullCalendar styles to match our theme */
    .fc {
      font-family: var(--font-body) !important;
    }

    .fc .fc-toolbar-title {
      font-family: var(--font-display) !important;
      font-size: 1.7rem !important;
      font-weight: 400 !important;
      color: var(--ink) !important;
    }

    .fc .fc-button {
      background: var(--bg-card) !important;
      border: 1.5px solid var(--border) !important;
      color: var(--ink) !important;
      font-family: var(--font-body) !important;
      font-size: 0.78rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.05em !important;
      border-radius: 6px !important;
      padding: 0.35rem 0.8rem !important;
      box-shadow: none !important;
      transition: background 0.15s !important;
    }

    .fc .fc-button:hover,
    .fc .fc-button-active {
      background: var(--ink) !important;
      color: var(--bg) !important;
      border-color: var(--ink) !important;
    }

    .fc .fc-col-header-cell-cushion {
      font-size: 0.72rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.1em !important;
      color: var(--ink-soft) !important;
      font-weight: 400 !important;
    }

    .fc .fc-daygrid-day-number {
      font-size: 0.8rem !important;
      color: var(--ink-mid) !important;
    }

    .fc .fc-daygrid-day.fc-day-today {
      background: rgba(193, 122, 92, 0.06) !important;
    }

    .fc .fc-daygrid-day.selected-day {
      background: rgba(122, 158, 126, 0.12) !important;
      outline: 2px solid var(--sage);
      outline-offset: -2px;
      border-radius: 4px;
    }

    /* "+X more" link styling */
    .fc .fc-daygrid-more-link {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--clay);
      font-family: var(--font-body);
      letter-spacing: 0.03em;
    }
    .fc .fc-daygrid-more-link:hover { color: var(--ink); }

    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
      background: var(--clay) !important;
      color: white !important;
      border-radius: 50% !important;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fc-event {
      border-radius: 5px !important;
      border: none !important;
      font-size: 0.72rem !important;
      font-family: var(--font-body) !important;
      padding: 1px 4px !important;
      cursor: pointer !important;
    }

    .fc-h-event .fc-event-title {
      font-weight: 500 !important;
    }

    /* ── Event detail modal ─────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(44, 36, 22, 0.25);
      animation: modalIn 0.22s ease;
      position: relative;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-color-bar {
      height: 4px;
      border-radius: 2px;
      margin-bottom: 1.25rem;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 400;
      line-height: 1.1;
    }

    .modal-studio {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-soft);
      margin-top: 0.25rem;
      margin-bottom: 1.25rem;
    }

    .modal-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      font-size: 0.88rem;
      color: var(--ink-mid);
    }

    .modal-icon {
      width: 18px;
      flex-shrink: 0;
      opacity: 0.5;
      margin-top: 1px;
    }

    .modal-book-btn {
      display: block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }

    .modal-book-btn:hover {
      background: var(--ink);
      transform: translateY(-1px);
    }
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--ink-soft);
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .modal-close:hover { color: var(--ink); }

    /* ── Empty state ────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-soft);
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Responsive / Mobile ────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Header */
      header { padding: 1rem 1.25rem; }
      header h1 { font-size: 1.6rem; }
      .header-brand { gap: 0.75rem; }
      .header-logo { width: 52px; height: 52px; }

      /* Filter bar — scroll horizontally on small screens */
      .filter-bar {
        padding: 0.6rem 1rem;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        gap: 0.4rem;
      }
      .filter-label { display: none; }
      .find-btn { margin-left: 0; flex-shrink: 0; }
      .pill { flex-shrink: 0; font-size: 0.72rem; padding: 0.28rem 0.7rem; }

      /* Main layout — calendar only on mobile, sidebar hidden */
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }

      /* Calendar takes full space, sidebar hidden on mobile
         (users navigate via FullCalendar's day view instead) */
      .calendar-pane {
        grid-row: 1;
        padding: 0.5rem;
      }
      .sidebar {
        display: none;
      }

      /* Shrink calendar text on small screens */
      .fc .fc-toolbar-title { font-size: 1.1rem !important; }
      .fc .fc-toolbar { flex-wrap: wrap; gap: 0.4rem; }
      .fc .fc-button { font-size: 0.7rem !important; padding: 0.28rem 0.55rem !important; }
      .fc .fc-daygrid-day-number { font-size: 0.7rem !important; }
      .fc .fc-event-title { font-size: 0.65rem; }
      .fc .fc-col-header-cell-cushion { font-size: 0.65rem !important; letter-spacing: 0.05em !important; }

      /* Discovery modal full-screen on mobile */
      .discovery-overlay { padding: 0; align-items: flex-end; }
      .discovery-modal { border-radius: 16px 16px 0 0; max-height: 92vh; overflow-y: auto; }
      .discovery-body { padding: 1.25rem; }

      /* Class cards more compact */
      .class-card { padding: 0.6rem 0.75rem; }
      .class-card-name { font-size: 0.82rem; }
      .class-card-meta { font-size: 0.72rem; }
    }

    /* Extra small phones */
    @media (max-width: 400px) {
      header h1 { font-size: 1.35rem; }
      .fc .fc-toolbar-title { font-size: 0.95rem !important; }
    }

    /* ── Find Studios modal ──────────────────────────────────────── */
    .find-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--clay);
      color: var(--clay);
      background: transparent;
      font-family: var(--font-body);
      letter-spacing: 0.04em;
      transition: all 0.18s ease;
      margin-left: auto;
    }
    .find-btn:hover { background: var(--clay); color: white; }

    .discovery-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,36,22,0.5);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .discovery-overlay.open { display: flex; }

    .discovery-modal {
      background: var(--bg-card);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 24px 80px rgba(44,36,22,0.25);
      animation: modalIn 0.22s ease;
      overflow: hidden;
    }

    .discovery-header {
      background: var(--bg-dark);
      color: var(--bg);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .discovery-header h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 400;
    }

    .discovery-header h2 em { font-style: italic; color: var(--clay-light); }

    .discovery-close {
      background: none; border: none; color: var(--bg);
      font-size: 1.2rem; cursor: pointer; opacity: 0.7;
      padding: 0.25rem;
    }
    .discovery-close:hover { opacity: 1; }

    .discovery-body { padding: 1.75rem 2rem; }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.75rem;
      align-items: end;
      margin-bottom: 1.25rem;
    }

    .search-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .search-field label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-soft);
    }
    .search-field input, .search-field select {
      padding: 0.55rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-field input:focus, .search-field select:focus {
      border-color: var(--clay);
    }

    /* ── Autocomplete suggestions dropdown ──────────────────────── */
    .suggestions-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1.5px solid var(--clay);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 2100;
      display: none;
      box-shadow: 0 10px 30px rgba(44,36,22,0.12);
    }

    .suggestions-dropdown.open { display: block; }

    .suggestion-item {
      padding: 0.65rem 0.85rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--ink);
      font-family: var(--font-body);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover,
    .suggestion-item.highlighted {
      background: rgba(193, 122, 92, 0.08);
    }
    .suggestion-icon {
      font-size: 0.8rem;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .suggestion-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search-btn {
      padding: 0.55rem 1.25rem;
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .search-btn:hover { background: var(--ink); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .discovery-status {
      font-size: 0.82rem;
      color: var(--ink-soft);
      margin-bottom: 1rem;
      min-height: 1.2em;
      font-style: italic;
    }

    .studio-results { display: flex; flex-direction: column; gap: 0.75rem; }

    .studio-result-card {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.85rem;
      align-items: start;
      background: var(--bg);
      transition: border-color 0.15s;
    }
    .studio-result-card:hover { border-color: var(--clay-light); }
    .studio-result-card.selected { border-color: var(--sage); background: rgba(122,158,126,0.05); }

    .studio-checkbox {
      width: 18px; height: 18px;
      accent-color: var(--sage);
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .studio-result-name {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.2rem;
    }

    .studio-result-meta {
      font-size: 0.75rem;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    .studio-platform-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      white-space: nowrap;
      font-weight: 500;
    }
    .badge-mindbody { background: #e8f4fd; color: #2563eb; }
    .badge-other    { background: var(--border); color: var(--ink-soft); }
    .badge-unknown  { background: #fef9e7; color: #b45309; }

    .discovery-footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .selected-count { font-size: 0.82rem; color: var(--ink-soft); }

    .add-selected-btn {
      padding: 0.6rem 1.5rem;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-selected-btn:hover { background: var(--ink); }
    .add-selected-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Config snippet box */
    .config-box {
      background: var(--bg-dark);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--clay-light);
      overflow-x: auto;
      white-space: pre;
      line-height: 1.6;
    }
    .copy-btn {
      margin-top: 0.75rem;
      padding: 0.4rem 1rem;
      background: transparent;
      border: 1px solid var(--clay-light);
      color: var(--clay-light);
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;

<script>
// ── App State ──────────────────────────────────────────────────────
let allClasses = [];
let activeStudios = new Set();
let calendar;
let selectedDate = new Date(); // tracks which day the sidebar shows

// ── Fetch Data ─────────────────────────────────────────────────────
async function loadSchedule() {
  try {
    // Loads schedule_data.json — the file your Python scraper generates
    const response = await fetch("schedule_data.json");
    const data = await response.json();
    allClasses = data.classes || [];

    // Show last updated time
    const updated = new Date(data.last_updated);
    document.getElementById("lastUpdated").textContent =
      `Updated ${updated.toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}`;

    // Build set of all studio names
    const studios = [...new Set(allClasses.map(c => c.studio))];
    studios.forEach(s => activeStudios.add(s));

    buildFilterPills(studios);
    buildSidebar();
    initCalendar();
  } catch (err) {
    console.error("Could not load schedule_data.json:", err);
    document.getElementById("lastUpdated").textContent = "Could not load data";
    document.getElementById("todayList").innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <p>Could not load schedule.<br/>Make sure <code>schedule_data.json</code> exists in your repo.</p>
      </div>`;
  }
}

// ── Studio Filter Pills ────────────────────────────────────────────
function buildFilterPills(studios) {
  const bar = document.getElementById("filterBar");
  studios.forEach(studio => {
    const color = allClasses.find(c => c.studio === studio)?.color || "#888";
    const pill = document.createElement("button");
    pill.className = "pill active";
    pill.style.color = color;
    pill.style.background = hexToRgba(color, 0.1);
    pill.dataset.studio = studio;
    pill.innerHTML = `<span class="pill-dot" style="background:${color}"></span>${studio}`;
    pill.addEventListener("click", () => toggleStudio(studio, pill));
    bar.appendChild(pill);
  });
}

function toggleStudio(studio, pill) {
  if (activeStudios.has(studio)) {
    activeStudios.delete(studio);
    pill.classList.remove("active");
    pill.style.background = "transparent";
  } else {
    activeStudios.add(studio);
    pill.classList.add("active");
    const color = allClasses.find(c => c.studio === studio)?.color || "#888";
    pill.style.background = hexToRgba(color, 0.1);
  }
  calendar.refetchEvents();
  buildSidebar();
}

// ── Sidebar ────────────────────────────────────────────────────────
// buildSidebar() always uses the global selectedDate.
// Call selectDay(date) to change which day is shown.
function selectDay(date) {
  selectedDate = date;
  buildSidebar();

  // Highlight the selected day on the calendar
  // Remove any previous highlight, then add to the new one
  document.querySelectorAll(".fc-day.selected-day").forEach(el => {
    el.classList.remove("selected-day");
  });
  const iso = date.toISOString().slice(0, 10); // "2026-04-13"
  const dayEl = document.querySelector(`.fc-day[data-date="${iso}"]`);
  if (dayEl) dayEl.classList.add("selected-day");
}

function buildSidebar() {
  const dateStr = selectedDate.toDateString();
  const isToday = dateStr === new Date().toDateString();
  const now     = new Date();

  // Update the sidebar title to reflect which day is selected
  const title = isToday
    ? "Today's Classes"
    : selectedDate.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("sidebarTitle").textContent = title;

  // Only show classes that haven't ended yet (keeps running classes
  // visible for late walk-ins — filter by end time, not start)
  const dayClasses = allClasses
    .filter(c => activeStudios.has(c.studio) && new Date(c.start).toDateString() === dateStr)
    .filter(c => new Date(c.end) >= now)
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  const list = document.getElementById("todayList");

  if (dayClasses.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🌿</div>
      <p>No classes ${isToday ? "today" : "on this day"}<br/>for selected studios.</p>
    </div>`;
    return;
  }

  list.innerHTML = dayClasses.map(cls => `
    <div class="class-card" style="border-left-color:${cls.color}" onclick="showModal(${JSON.stringify(cls).replace(/"/g, '&quot;')})">
      <div class="class-card-name">${cls.title} <span class="level-badge">${cls.level}</span></div>
      <div class="class-card-meta">
        ${formatTime(cls.start)} – ${formatTime(cls.end)} · ${cls.instructor}
      </div>
      ${cls.spots_left != null ? `<span class="class-card-spots ${cls.spots_left <= 5 ? 'few' : ''}">${cls.spots_left} spots left</span>` : ""}
    </div>
  `).join("");
}

// ── FullCalendar ───────────────────────────────────────────────────
function initCalendar() {
  const el = document.getElementById("calendar");
  calendar = new FullCalendar.Calendar(el, {
    initialView: "dayGridMonth",
    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,timeGridWeek,timeGridDay"
    },
    buttonText: {
      today: "Today",
      month: "Month",
      week:  "Week",
      day:   "Day"
    },
    height: "auto",
    dayMaxEvents: 4,       // show max 4 events per day, then "+X more" link
    moreLinkClick: "day",  // clicking "+X more" switches to day view
    events: fetchCalendarEvents,
    eventClick: ({ event }) => {
      // Clicking an event selects that day AND opens the modal
      selectDay(new Date(event.start));
      showModal(event.extendedProps.rawData);
    },
    dateClick: ({ date }) => {
      selectDay(date);
      // On mobile, clicking a day opens the full day view
      // since the sidebar is hidden
      if (window.innerWidth <= 768) {
        calendar.changeView("timeGridDay", date);
      }
    },
    datesSet: () => buildSidebar()
  });
  calendar.render();
}

function fetchCalendarEvents(info, successCallback) {
  const now = new Date();
  // Only show classes that haven't ended yet (keeps in-progress classes
  // visible for late walk-ins — filter by end time, not start time)
  const events = allClasses
    .filter(c => activeStudios.has(c.studio))
    .filter(c => new Date(c.end) >= now)
    .map(c => ({
      id:    c.id,
      title: c.title,
      start: c.start,
      end:   c.end,
      backgroundColor: c.color,
      borderColor:     c.color,
      extendedProps: { rawData: c }
    }));
  successCallback(events);
}

// ── Modal ──────────────────────────────────────────────────────────
function showModal(cls) {
  if (typeof cls === "string") cls = JSON.parse(cls);
  document.getElementById("modalColorBar").style.background = cls.color;
  document.getElementById("modalTitle").textContent = cls.title;
  document.getElementById("modalStudio").textContent = cls.studio;
  document.getElementById("modalTime").textContent =
    `${formatDate(cls.start)}  ·  ${formatTime(cls.start)} – ${formatTime(cls.end)}`;
  document.getElementById("modalInstructor").textContent = cls.instructor;
  document.getElementById("modalLevel").textContent = cls.level;

  const spotsRow = document.getElementById("modalSpotsRow");
  if (cls.spots_left != null) {
    spotsRow.style.display = "flex";
    document.getElementById("modalSpots").textContent = `${cls.spots_left} spots remaining`;
  } else {
    spotsRow.style.display = "none";
  }

  // Set the Book Now button — links to booking URL if available,
  // otherwise falls back to the studio's main Mindbody page
  const bookBtn = document.getElementById("modalBookBtn");
  const bookingUrl = cls.booking_url ||
    "https://www.mindbodyonline.com/explore/locations/victor-yoga-studio";
  bookBtn.href = bookingUrl;
  bookBtn.style.background = cls.color || "var(--clay)";

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Helpers ────────────────────────────────────────────────────────
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Boot ───────────────────────────────────────────────────────────
loadSchedule();

// ── Studio Discovery ───────────────────────────────────────────────
let studioDirectory = [];  // loaded from studio_directory.json

// Inline fallback — always shown if the JSON file hasn't loaded yet
const BUILTIN_STUDIOS = [

function openDiscovery() {
  document.getElementById("discoveryOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
  // Show built-in studios immediately, then try to load the JSON for any updates
  if (!studioDirectory.length) {
    studioDirectory = BUILTIN_STUDIOS;
    renderDirectoryStudios(studioDirectory, "Rochester, NY area");
    loadStudioDirectory(); // upgrade in background if file exists
  }
}

function closeDiscovery(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("discoveryOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ── Load curated directory ─────────────────────────────────────────
async function loadStudioDirectory() {
  try {
    const res = await fetch("studio_directory.json");
    if (!res.ok) return; // file not found — keep built-in data
    const data = await res.json();
    studioDirectory = [];
    for (const [city, studios] of Object.entries(data.cities)) {
      studios.forEach(s => studioDirectory.push({ ...s, city_label: city }));
    }
    // Silently upgrade the display if the modal is still open
    if (document.getElementById("discoveryOverlay").classList.contains("open")) {
      renderDirectoryStudios(studioDirectory, "Rochester, NY area");
    }
  } catch (err) {
    // Keep using built-in data silently
  }
}

// ── Render directory studios ───────────────────────────────────────
function renderDirectoryStudios(studios, locationLabel, searchCoords) {
  const status  = document.getElementById("discoveryStatus");
  const results = document.getElementById("studioResults");

  const live       = studios.filter(s => s.integration_status === "live");
  const comingSoon = studios.filter(s => s.integration_status === "coming_soon");

  status.innerHTML = `
    <strong>${studios.length} studios</strong> near ${locationLabel} —
    <span style="color:var(--sage)">✅ ${live.length} with live schedules</span>
    · <span style="color:var(--ink-soft)">🔄 ${comingSoon.length} coming soon</span>
  `;

  results.innerHTML = studios.map(s => renderStudioCard(s, searchCoords)).join("");
}

// ── Individual studio card ─────────────────────────────────────────
function renderStudioCard(s, searchCoords) {
  const isLive = s.integration_status === "live";

  const badge = isLive
    ? `<span class="studio-platform-badge badge-mindbody">✅ Schedule Live</span>`
    : `<span class="studio-platform-badge badge-unknown">🔄 Coming Soon</span>`;

  // Calculate approximate distance if we have search coordinates
  // and the studio has known coordinates
  let distanceTag = "";
  if (searchCoords && s.lat && s.lng) {
    const d = milesApart(searchCoords.lat, searchCoords.lng, s.lat, s.lng);
    distanceTag = `<span style="font-size:0.7rem; color:var(--ink-soft); margin-left:0.4rem;">
      📍 ~${d < 1 ? "< 1" : Math.round(d)} mi away
    </span>`;
  }

  const specialtyTags = (s.specialties || [])
    .map(sp => `<span style="display:inline-block; font-size:0.65rem; padding:0.1rem 0.4rem;
                       background:var(--border); border-radius:4px; margin:0.1rem;
                       color:var(--ink-mid);">${sp}</span>`)
    .join("");

  const actions = isLive
    ? `<button onclick="filterToStudio('${s.name.replace(/'/g, "\\'")}')"
               style="padding:0.4rem 1rem; background:var(--clay); color:white;
                      border:none; border-radius:6px; font-family:var(--font-body);
                      font-size:0.78rem; cursor:pointer; transition:background 0.15s;"
               onmouseover="this.style.background='var(--ink)'"
               onmouseout="this.style.background='var(--clay)'">
         View on Calendar →
       </button>`
    : `<button onclick="notifyMe('${s.name.replace(/'/g, "\\'")}')"
               style="padding:0.4rem 1rem; background:transparent;
                      border:1.5px solid var(--ink-soft); color:var(--ink-soft);
                      border-radius:6px; font-family:var(--font-body);
                      font-size:0.78rem; cursor:pointer; transition:all 0.15s;"
               onmouseover="this.style.borderColor='var(--clay)';this.style.color='var(--clay)'"
               onmouseout="this.style.borderColor='var(--ink-soft)';this.style.color='var(--ink-soft)'">
         🔔 Notify Me
       </button>
       ${s.website ? `<a href="${s.website}" target="_blank" rel="noopener"
               style="padding:0.4rem 1rem; color:var(--clay); font-size:0.78rem;
                      text-decoration:none; font-family:var(--font-body);">
         Visit Website →
       </a>` : ""}`;

  return `
  <div class="studio-result-card" style="grid-template-columns:1fr auto; display:grid; gap:0.75rem;">
    <div>
      <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.3rem; flex-wrap:wrap;">
        <div class="studio-result-name">${s.name}</div>
        ${badge}
        ${distanceTag}
      </div>
      <div class="studio-result-meta">
        📍 ${s.area}
        ${s.phone ? ` · 📞 ${s.phone}` : ""}
        ${s.description ? `<br/><em style="color:var(--ink-soft)">${s.description}</em>` : ""}
        ${specialtyTags ? `<br/><div style="margin-top:0.3rem;">${specialtyTags}</div>` : ""}
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:0.4rem; align-items:flex-end; justify-content:center;">
      ${actions}
    </div>
  </div>`;
}

// ── Filter calendar to a studio ────────────────────────────────────
function filterToStudio(studioName) {
  // Close the discovery modal
  closeDiscovery();

  // Make only this studio active in the filter pills
  activeStudios.clear();
  activeStudios.add(studioName);

  // Update pill UI
  document.querySelectorAll(".pill").forEach(pill => {
    const isActive = pill.dataset.studio === studioName;
    pill.classList.toggle("active", isActive);
    const color = allClasses.find(c => c.studio === pill.dataset.studio)?.color || "#888";
    pill.style.background = isActive ? hexToRgba(color, 0.1) : "transparent";
  });

  calendar.refetchEvents();
  buildSidebar();
}

// ── Location autocomplete ──────────────────────────────────────────
// Uses Nominatim (OpenStreetMap) to suggest cities as the user types.
// Debounces keystrokes so we don't hammer the API on every keypress.
let autocompleteTimer = null;
let autocompleteHighlight = -1;
let currentSuggestions = [];

// Local cities that always show first for instant feedback
// (before the network request even completes)
const LOCAL_CITY_HINTS = [
  "Rochester, NY",
  "Pittsford, NY",
  "Fairport, NY",
  "Webster, NY",
  "Victor, NY",
  "Penfield, NY"
];

function handleLocationInput() {
  const input = document.getElementById("locationInput");
  const query = input.value.trim();

  // Hide dropdown if empty
  if (!query) {
    hideSuggestions();
    return;
  }

  // Step 1: Show instant local hints that match what they've typed
  const instantMatches = LOCAL_CITY_HINTS
    .filter(c => c.toLowerCase().includes(query.toLowerCase()))
    .map(name => ({ name, type: "local" }));
  if (instantMatches.length) {
    renderSuggestions(instantMatches);
  }

  // Step 2: Debounced network call to Nominatim for broader suggestions
  clearTimeout(autocompleteTimer);
  autocompleteTimer = setTimeout(() => fetchLocationSuggestions(query), 250);
}

async function fetchLocationSuggestions(query) {
  if (query.length < 2) return;
  try {
    // Nominatim endpoint — limit to cities/towns/zips in the US for relevance
    const url = `https://nominatim.openstreetmap.org/search?` +
      `q=${encodeURIComponent(query)}&format=json&limit=8&addressdetails=1&countrycodes=us`;
    const res  = await fetch(url, { headers: { "Accept-Language": "en" } });
    const data = await res.json();

    // Keep only city/town/village/zip-style hits, dedupe by display name
    const seen = new Set();
    const networkHits = data
      .filter(d => {
        const type = d.type || "";
        const cls  = d.class || "";
        return (
          ["city", "town", "village", "hamlet", "administrative", "postcode"].includes(type) ||
          cls === "place" || cls === "boundary"
        );
      })
      .map(d => {
        // Build a clean "City, State" or "Zip — City, State" label
        const a = d.address || {};
        const city  = a.city || a.town || a.village || a.hamlet || a.suburb || a.county;
        const state = a.state;
        const zip   = a.postcode;
        let label;
        if (d.type === "postcode" && zip) {
          label = `${zip}${city ? " — " + city : ""}${state ? ", " + state : ""}`;
        } else if (city && state) {
          label = `${city}, ${state}`;
        } else {
          label = d.display_name.split(",").slice(0, 2).join(",").trim();
        }
        return { name: label, type: "remote" };
      })
      .filter(s => {
        if (seen.has(s.name)) return false;
        seen.add(s.name);
        return true;
      });

    // Merge local hints (top) with network hits, dedupe
    const locals = LOCAL_CITY_HINTS
      .filter(c => c.toLowerCase().includes(query.toLowerCase()))
      .map(name => ({ name, type: "local" }));

    const combined = [...locals];
    for (const hit of networkHits) {
      if (!combined.some(c => c.name.toLowerCase() === hit.name.toLowerCase())) {
        combined.push(hit);
      }
    }
    renderSuggestions(combined.slice(0, 8));
  } catch (err) {
    // Silent fail — keep whatever local hints are already showing
  }
}

function renderSuggestions(suggestions) {
  const dropdown = document.getElementById("locationSuggestions");
  currentSuggestions = suggestions;
  autocompleteHighlight = -1;

  if (!suggestions.length) {
    hideSuggestions();
    return;
  }

  dropdown.innerHTML = suggestions.map((s, i) => `
    <div class="suggestion-item" data-index="${i}"
         onmousedown="selectSuggestion(${i})"
         onmouseenter="highlightSuggestion(${i})">
      <span class="suggestion-icon">${s.type === "local" ? "⭐" : "📍"}</span>
      <span class="suggestion-text">${s.name}</span>
    </div>
  `).join("");
  dropdown.classList.add("open");
}

function hideSuggestions() {
  document.getElementById("locationSuggestions").classList.remove("open");
  autocompleteHighlight = -1;
}

function selectSuggestion(index) {
  const s = currentSuggestions[index];
  if (!s) return;
  document.getElementById("locationInput").value = s.name;
  hideSuggestions();
  searchStudios();
}

function highlightSuggestion(index) {
  autocompleteHighlight = index;
  document.querySelectorAll(".suggestion-item").forEach((el, i) => {
    el.classList.toggle("highlighted", i === index);
  });
}

function handleLocationKeydown(e) {
  const open = document.getElementById("locationSuggestions").classList.contains("open");

  if (e.key === "Enter") {
    if (open && autocompleteHighlight >= 0) {
      e.preventDefault();
      selectSuggestion(autocompleteHighlight);
    } else {
      searchStudios();
    }
    return;
  }
  if (!open) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    highlightSuggestion(Math.min(autocompleteHighlight + 1, currentSuggestions.length - 1));
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    highlightSuggestion(Math.max(autocompleteHighlight - 1, 0));
  } else if (e.key === "Escape") {
    hideSuggestions();
  }
}

// ── OSM search for other cities ────────────────────────────────────
async function searchStudios() {
  const location = document.getElementById("locationInput").value.trim();
  const radius   = document.getElementById("radiusSelect").value;
  if (!location) {
    document.getElementById("discoveryStatus").textContent = "Please enter a location first.";
    return;
  }

  // Step 1: Direct city name match against directory
  const cityMatch = studioDirectory.filter(s =>
    s.city_label.toLowerCase().includes(location.toLowerCase()) ||
    location.toLowerCase().includes(s.city_label.split(",")[0].toLowerCase())
  );
  if (cityMatch.length > 0) {
    renderDirectoryStudios(cityMatch, location);
    return;
  }

  // Step 2: Geocode the input to get real coordinates and city name
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("studioResults").innerHTML = "";
  document.getElementById("discoveryStatus").textContent = `🔍 Looking up "${location}"…`;

  let lat, lng, displayName, fullName;
  try {
    const geoRes = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const geoData = await geoRes.json();
    if (!geoData.length) {
      document.getElementById("discoveryStatus").textContent =
        `Could not find "${location}". Try a format like "Buffalo, NY" or "14604".`;
      document.getElementById("searchBtn").disabled = false;
      return;
    }
    lat         = parseFloat(geoData[0].lat);
    lng         = parseFloat(geoData[0].lon);
    displayName = geoData[0].display_name.split(",").slice(0, 2).join(",").trim();
    fullName    = geoData[0].display_name.toLowerCase();
  } catch (err) {
    document.getElementById("discoveryStatus").textContent = "Geocoding failed — " + err.message;
    document.getElementById("searchBtn").disabled = false;
    return;
  }

  // Step 3: Check if the geocoded location is near a city in our directory.
  // Compute distance between geocoded point and each known city.
  // If within ~40 miles, show the directory for that city instead of OSM.
  const KNOWN_CITY_COORDS = {
    "Rochester, NY": { lat: 43.1566, lng: -77.6088 }
    // Add more cities here as the app expands
  };

  function milesApart(lat1, lng1, lat2, lng2) {
    const R = 3958.8; // Earth radius in miles
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  for (const [cityLabel, coords] of Object.entries(KNOWN_CITY_COORDS)) {
    const dist = milesApart(lat, lng, coords.lat, coords.lng);
    if (dist <= 40) {
      const cityStudios = studioDirectory.filter(s => s.city_label === cityLabel);
      const searchCoords = { lat, lng };
      renderDirectoryStudios(
        cityStudios,
        `${displayName} (${Math.round(dist)} mi from ${cityLabel})`,
        searchCoords
      );
      document.getElementById("searchBtn").disabled = false;
      return;
    }
  }

  // Step 4: Truly unknown location — try OSM/Overpass
  document.getElementById("discoveryStatus").textContent =
    `📍 ${displayName} — searching for yoga studios…`;

  try {
    const radiusM = radius * 1609;
    const query = `
      [out:json][timeout:30];
      (
        node["name"~"yoga",i](around:${radiusM},${lat},${lng});
        node["name"~"pilates",i](around:${radiusM},${lat},${lng});
        way["name"~"yoga",i](around:${radiusM},${lat},${lng});
        way["name"~"pilates",i](around:${radiusM},${lat},${lng});
      );
      out body center;
    `;
    const ovRes  = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(query)
    });
    if (!ovRes.ok) throw new Error(`Overpass error ${ovRes.status}`);
    const ovData = await ovRes.json();

    const seen = new Set();
    const osmStudios = ovData.elements
      .filter(el => el.tags?.name && !seen.has(el.tags.name) && seen.add(el.tags.name))
      .map(el => {
        const t = el.tags;
        return {
          name: t.name,
          area: [t["addr:city"], t["addr:state"]].filter(Boolean).join(", ") || displayName,
          address: [t["addr:housenumber"], t["addr:street"]].filter(Boolean).join(" "),
          phone: t.phone || t["contact:phone"] || "",
          website: t.website || "",
          platform: "Unknown",
          mindbody_url: "",
          integration_status: "not_integrated",
          color: "#888",
          description: t.opening_hours ? `Hours: ${t.opening_hours}` : "",
          specialties: []
        };
      });

    if (!osmStudios.length) {
      document.getElementById("discoveryStatus").textContent = "";
      document.getElementById("studioResults").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🗺️</div>
          <p>No studios found near ${displayName} in our map data.<br/>
          <a href="https://www.mindbodyonline.com/explore" target="_blank" style="color:var(--clay)">
            Search on Mindbody →
          </a></p>
        </div>`;
    } else {
      renderOsmStudios(osmStudios, displayName);
    }
  } catch (err) {
    document.getElementById("discoveryStatus").textContent =
      "Search failed — " + err.message;
  } finally {
    document.getElementById("searchBtn").disabled = false;
  }
}

// ── Render OSM studios (for non-curated cities) ────────────────────
function renderOsmStudios(studios, locationLabel) {
  const status  = document.getElementById("discoveryStatus");
  const results = document.getElementById("studioResults");

  status.innerHTML = `Found <strong>${studios.length} studios</strong> near ${locationLabel}.
    <span style="color:var(--ink-soft); font-size:0.78rem;">
      Schedules for these studios are not yet integrated —
      submit a request below to add them!
    </span>`;

  results.innerHTML = studios.map(s => `
    <div class="studio-result-card" style="grid-template-columns:1fr auto;">
      <div>
        <div class="studio-result-name">${s.name}</div>
        <div class="studio-result-meta">
          📍 ${s.area}${s.address ? ` · ${s.address}` : ""}
          ${s.phone ? `<br/>📞 ${s.phone}` : ""}
          ${s.website ? `<br/>🌐 <a href="${s.website}" target="_blank" style="color:var(--clay)">${s.website.replace(/^https?:\/\//, "")}</a>` : ""}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; justify-content:center;">
        <span class="studio-platform-badge badge-unknown">Not Integrated</span>
        <button onclick="requestStudio('${s.name.replace(/'/g, "\\'")}', '${s.website}')"
                style="padding:0.35rem 0.75rem; background:transparent;
                       border:1px solid var(--clay); color:var(--clay);
                       border-radius:6px; font-size:0.72rem; cursor:pointer;
                       font-family:var(--font-body);">
          Request →
        </button>
      </div>
    </div>`).join("") + `
    <p style="font-size:0.75rem; color:var(--ink-soft); text-align:center; margin-top:0.5rem;">
      Not all studios appear in map data.
      <a href="https://www.mindbodyonline.com/explore" target="_blank" style="color:var(--clay)">Search Mindbody →</a>
    </p>`;
}

// ── Notify me ─────────────────────────────────────────────────────
function notifyMe(studioName) {
  const subject = encodeURIComponent(`Schedule Request: ${studioName}`);
  const body    = encodeURIComponent(
    `Hi,\n\nI'd love to see ${studioName}'s class schedule added to the Yo-Go — Local Yoga Calendar!\n\nThanks`
  );
  // Replace this email with your own
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}

// ── Request a studio from OSM results ─────────────────────────────
function requestStudio(name, website) {
  const subject = encodeURIComponent(`Studio Integration Request: ${name}`);
  const body    = encodeURIComponent(
    `Hi,\n\nI'd like to request that ${name} be added to the Yo-Go — Local Yoga Calendar.\n\nWebsite: ${website || 'N/A'}\n\nThanks!`
  );
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}

// ── Request a new studio (generic) ────────────────────────────────
function requestNewStudio() {
  const subject = encodeURIComponent("New Studio Integration Request");
  const body    = encodeURIComponent(
    `Hi,\n\nI'd like to request a yoga studio be added to the Yo-Go — Local Yoga Calendar.\n\nStudio name:\nWebsite:\nLocation:\n\nThanks!`
  );
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}
