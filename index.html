<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yo-Go — Local Yoga Class Calendar</title>

  <!-- Favicon: use the logo -->
  <link rel="icon" type="image/png" href="assets/yogo-logo.png"/>
  <link rel="apple-touch-icon" href="assets/yogo-logo.png"/>

  <!-- FullCalendar: renders the Google Calendar-style view -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Cormorant Garamond: elegant serif for headings -->
  <!-- Jost: clean geometric sans for body -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    /* ── Design System — Glassmorphism Dark ───────────────────────── */
    :root {
      --bg-base:      #16192e;
      --bg-surface:   rgba(255,255,255,0.06);
      --bg-surface-2: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.14);
      --glass-border-2: rgba(255,255,255,0.22);

      /* Jewel accent palette */
      --amethyst:     #b88fc4;
      --amethyst-dark:#6b4ea8;
      --teal:         #5dcaa5;
      --teal-dark:    #2d9e75;
      --coral:        #f0997b;
      --coral-dark:   #d85a30;
      --sapphire:     #6aa3d4;
      --rose:         #e88aab;

      /* Text */
      --text-bright:  rgba(255,255,255,0.95);
      --text-mid:     rgba(255,255,255,0.70);
      --text-soft:    rgba(255,255,255,0.45);
      --text-faint:   rgba(255,255,255,0.28);

      /* Legacy aliases so JS color references keep working */
      --clay:         #e88aab;
      --clay-light:   #f5c4d3;
      --sage:         #5dcaa5;
      --sage-light:   #9fe1cb;
      --ink:          var(--text-bright);
      --ink-mid:      var(--text-mid);
      --ink-soft:     var(--text-soft);
      --border:       var(--glass-border);
      --bg:           var(--bg-base);
      --bg-card:      var(--bg-surface);
      --bg-dark:      rgba(0,0,0,0.35);
      --shadow:       rgba(0,0,0,0.25);
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'Jost', sans-serif;
      --radius:       14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      color: var(--text-bright);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 18%, #5b3a90 0%, transparent 42%),
        radial-gradient(circle at 88% 25%, #1d6b8a 0%, transparent 48%),
        radial-gradient(circle at 55% 92%, #9e3060 0%, transparent 44%),
        radial-gradient(circle at 35% 60%, #1a3a6e 0%, transparent 38%),
        linear-gradient(145deg, #0f1228 0%, #1a1535 50%, #0e1a2a 100%);
      background-attachment: fixed;
    }

    /* ── Glass utility ──────────────────────────────────────────────
       Think of it like a window in a spaceship — the dark cosmos shows
       through from behind, and the glass panel sits on top.             */
    .glass {
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      background: var(--bg-surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    /* ── Scroll-fade animation ────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Header ─────────────────────────────────────────────────────
       1fr-auto-1fr grid keeps the logo perfectly centered while
       the wordmark sits left and the timestamp floats top-right.       */
    header {
      padding: 1.75rem 3rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 2rem;
      position: relative;
      backdrop-filter: blur(30px) saturate(1.2);
      -webkit-backdrop-filter: blur(30px) saturate(1.2);
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      grid-column: 1;
      justify-self: start;
      animation: fadeUp 0.6s ease both;
    }

    .header-brand h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text-bright);
    }

    .header-brand h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--rose) 0%, var(--amethyst) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-brand p {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    /* Logo: glass ring around the circular mark */
    .header-logo {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      padding: 6px;
      object-fit: contain;
      grid-column: 2;
      border: 2px solid var(--glass-border-2);
      box-shadow: 0 0 30px rgba(184,143,196,0.25), 0 0 60px rgba(93,202,165,0.1);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .last-updated {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-faint);
      letter-spacing: 0.08em;
    }

    /* ── Studio filter pills ─────────────────────────────────────── */
    .filter-bar {
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--glass-border);
      padding: 0.85rem 3rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .filter-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      margin-right: 0.25rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 400;
      cursor: pointer;
      color: var(--text-mid);
      border: 1px solid var(--glass-border);
      background: var(--bg-surface);
      transition: all 0.22s ease;
      user-select: none;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pill.active {
      background: var(--bg-surface-2);
      border-color: var(--glass-border-2);
      color: var(--text-bright);
    }

    .pill:hover {
      background: var(--bg-surface-2);
      border-color: var(--glass-border-2);
      transform: translateY(-2px);
      color: var(--text-bright);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 1.25rem;
      min-height: calc(100vh - 160px);
      padding: 1.25rem;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      padding: 1.25rem;
      overflow-y: auto;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .sidebar-section-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--text-faint);
      margin-bottom: 0.75rem;
      margin-top: 1.25rem;
    }
    .sidebar-section-title:first-child { margin-top: 0; }

    .class-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .class-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--amethyst);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: all 0.22s ease;
    }
    .class-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(4px);
      border-color: var(--glass-border-2);
    }

    .class-card-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-bright);
      line-height: 1.2;
    }
    .class-card-meta {
      margin-top: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-mid);
      font-weight: 300;
    }
    .class-card-spots {
      display: inline-block;
      margin-top: 0.3rem;
      font-size: 0.62rem;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      background: rgba(93,202,165,0.15);
      color: var(--teal);
      border: 1px solid rgba(93,202,165,0.3);
    }
    .class-card-spots.few {
      background: rgba(232,138,171,0.15);
      color: var(--rose);
      border-color: rgba(232,138,171,0.3);
    }

    .level-badge {
      display: inline-block;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.3rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      color: var(--text-soft);
    }

    /* ── Calendar pane ───────────────────────────────────────────── */
    .calendar-pane {
      padding: 1.25rem 1.5rem;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    /* FullCalendar overrides for dark glass theme */
    .fc {
      font-family: var(--font-body) !important;
      color: var(--text-bright) !important;
    }
    .fc .fc-toolbar-title {
      font-family: var(--font-display) !important;
      font-size: 1.7rem !important;
      font-weight: 400 !important;
      color: var(--text-bright) !important;
    }
    .fc .fc-button {
      background: rgba(255,255,255,0.07) !important;
      border: 1px solid var(--glass-border) !important;
      color: var(--text-mid) !important;
      font-family: var(--font-body) !important;
      font-size: 0.76rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.05em !important;
      border-radius: 8px !important;
      padding: 0.35rem 0.8rem !important;
      box-shadow: none !important;
      transition: all 0.2s !important;
    }
    .fc .fc-button:hover,
    .fc .fc-button-active {
      background: linear-gradient(135deg, var(--amethyst-dark), var(--amethyst)) !important;
      border-color: transparent !important;
      color: #fff !important;
    }
    .fc .fc-col-header-cell-cushion {
      font-size: 0.65rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.15em !important;
      color: var(--text-faint) !important;
      font-weight: 500 !important;
    }
    .fc .fc-daygrid-day-number {
      font-size: 0.78rem !important;
      color: var(--text-mid) !important;
    }
    .fc th, .fc td {
      border-color: rgba(255,255,255,0.06) !important;
    }
    .fc .fc-scrollgrid {
      border-color: rgba(255,255,255,0.08) !important;
    }
    .fc .fc-daygrid-day {
      background: transparent !important;
      transition: background 0.2s !important;
    }
    .fc .fc-daygrid-day:hover {
      background: rgba(255,255,255,0.04) !important;
    }
    .fc .fc-daygrid-day.fc-day-today {
      background: linear-gradient(135deg, rgba(107,78,168,0.15), rgba(184,143,196,0.1)) !important;
    }
    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
      background: linear-gradient(135deg, var(--amethyst-dark), var(--rose)) !important;
      color: white !important;
      border-radius: 50% !important;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fc .fc-daygrid-day.selected-day {
      background: rgba(93,202,165,0.08) !important;
      outline: 1px solid rgba(93,202,165,0.4);
      outline-offset: -1px;
    }
    .fc .fc-daygrid-more-link {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--rose);
      font-family: var(--font-body);
      letter-spacing: 0.03em;
    }
    .fc .fc-daygrid-more-link:hover { color: var(--amethyst); }
    .fc-event {
      border-radius: 5px !important;
      border: none !important;
      font-size: 0.7rem !important;
      font-family: var(--font-body) !important;
      padding: 1px 5px !important;
      cursor: pointer !important;
      opacity: 0.88;
      transition: opacity 0.18s !important;
    }
    .fc-event:hover { opacity: 1 !important; }
    .fc-h-event .fc-event-title { font-weight: 500 !important; }

    /* ── Event detail modal ──────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      backdrop-filter: blur(30px) saturate(1.5);
      -webkit-backdrop-filter: blur(30px) saturate(1.5);
      background: rgba(30,22,60,0.85);
      border: 1px solid var(--glass-border-2);
      border-radius: 20px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(107,78,168,0.15);
      animation: modalIn 0.22s ease;
      position: relative;
    }

    .modal-color-bar {
      height: 3px;
      border-radius: 2px;
      margin-bottom: 1.25rem;
      opacity: 0.7;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--text-bright);
    }
    .modal-studio {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-soft);
      margin-top: 0.25rem;
      margin-bottom: 1.25rem;
    }
    .modal-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      font-size: 0.88rem;
      color: var(--text-mid);
    }
    .modal-icon {
      width: 18px;
      flex-shrink: 0;
      opacity: 0.4;
      margin-top: 1px;
    }
    .modal-book-btn {
      display: block;
      margin-top: 1.5rem;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, var(--amethyst-dark), var(--amethyst));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      width: 100%;
      transition: all 0.22s ease;
      box-shadow: 0 4px 20px rgba(107,78,168,0.4);
    }
    .modal-book-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(107,78,168,0.5);
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.15); color: var(--text-bright); }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-soft);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.35; }
    .empty-state p { font-size: 0.85rem; font-weight: 300; line-height: 1.6; }

    /* ── Find Studios modal ──────────────────────────────────────── */
    .find-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(184,143,196,0.5);
      color: var(--amethyst);
      background: rgba(184,143,196,0.1);
      font-family: var(--font-body);
      letter-spacing: 0.04em;
      transition: all 0.22s ease;
      margin-left: auto;
    }
    .find-btn:hover {
      background: linear-gradient(135deg, var(--amethyst-dark), var(--amethyst));
      border-color: transparent;
      color: white;
      transform: translateY(-1px);
    }

    .discovery-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 2000;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .discovery-overlay.open { display: flex; }

    .discovery-modal {
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
      background: rgba(20,16,45,0.92);
      border: 1px solid var(--glass-border-2);
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(107,78,168,0.12);
      animation: modalIn 0.22s ease;
      overflow: hidden;
    }

    .discovery-header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--glass-border);
    }
    .discovery-header h2 {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 400;
      color: var(--text-bright);
    }
    .discovery-header h2 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--rose), var(--amethyst));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .discovery-close {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .discovery-close:hover { background: rgba(255,255,255,0.16); color: var(--text-bright); }

    .discovery-body { padding: 1.75rem 2rem; }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.75rem;
      align-items: end;
      margin-bottom: 1.25rem;
    }

    .search-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .search-field label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-faint);
    }
    .search-field input, .search-field select {
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      background: rgba(255,255,255,0.06);
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .search-field input::placeholder { color: var(--text-faint); }
    .search-field input:focus, .search-field select:focus {
      border-color: var(--amethyst);
      background: rgba(255,255,255,0.1);
    }
    .search-field select option { background: #1a1535; color: var(--text-bright); }

    /* ── Autocomplete dropdown ───────────────────────────────────── */
    .suggestions-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      backdrop-filter: blur(20px);
      background: rgba(20,16,50,0.95);
      border: 1px solid var(--amethyst);
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 2100;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .suggestions-dropdown.open { display: block; }

    .suggestion-item {
      padding: 0.65rem 0.85rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-mid);
      font-family: var(--font-body);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.12s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover,
    .suggestion-item.highlighted {
      background: rgba(184,143,196,0.12);
      color: var(--text-bright);
    }
    .suggestion-icon { font-size: 0.8rem; opacity: 0.6; flex-shrink: 0; }
    .suggestion-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .search-btn {
      padding: 0.55rem 1.25rem;
      background: linear-gradient(135deg, var(--amethyst-dark), var(--amethyst));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(107,78,168,0.35);
    }
    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(107,78,168,0.5);
    }

<script>
// ── App State ──────────────────────────────────────────────────────
let allClasses = [];
let activeStudios = new Set();
let calendar;
let selectedDate = new Date(); // tracks which day the sidebar shows

// ── Fetch Data ─────────────────────────────────────────────────────
async function loadSchedule() {
  try {
    // Loads schedule_data.json — the file your Python scraper generates
    const response = await fetch("schedule_data.json");
    const data = await response.json();
    allClasses = data.classes || [];

    // Show last updated time
    const updated = new Date(data.last_updated);
    document.getElementById("lastUpdated").textContent =
      `Updated ${updated.toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}`;

    // Build set of all studio names
    const studios = [...new Set(allClasses.map(c => c.studio))];
    studios.forEach(s => activeStudios.add(s));

    buildFilterPills(studios);
    buildSidebar();
    initCalendar();
  } catch (err) {
    console.error("Could not load schedule_data.json:", err);
    document.getElementById("lastUpdated").textContent = "Could not load data";
    document.getElementById("todayList").innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <p>Could not load schedule.<br/>Make sure <code>schedule_data.json</code> exists in your repo.</p>
      </div>`;
  }
}

// ── Studio Filter Pills ────────────────────────────────────────────
function buildFilterPills(studios) {
  const bar = document.getElementById("filterBar");
  studios.forEach(studio => {
    const color = allClasses.find(c => c.studio === studio)?.color || "#888";
    const pill = document.createElement("button");
    pill.className = "pill active";
    pill.style.color = color;
    pill.style.background = hexToRgba(color, 0.1);
    pill.dataset.studio = studio;
    pill.innerHTML = `<span class="pill-dot" style="background:${color}"></span>${studio}`;
    pill.addEventListener("click", () => toggleStudio(studio, pill));
    bar.appendChild(pill);
  });
}

function toggleStudio(studio, pill) {
  if (activeStudios.has(studio)) {
    activeStudios.delete(studio);
    pill.classList.remove("active");
    pill.style.background = "transparent";
  } else {
    activeStudios.add(studio);
    pill.classList.add("active");
    const color = allClasses.find(c => c.studio === studio)?.color || "#888";
    pill.style.background = hexToRgba(color, 0.1);
  }
  calendar.refetchEvents();
  buildSidebar();
}

// ── Sidebar ────────────────────────────────────────────────────────
// buildSidebar() always uses the global selectedDate.
// Call selectDay(date) to change which day is shown.
function selectDay(date) {
  selectedDate = date;
  buildSidebar();

  // Highlight the selected day on the calendar
  // Remove any previous highlight, then add to the new one
  document.querySelectorAll(".fc-day.selected-day").forEach(el => {
    el.classList.remove("selected-day");
  });
  const iso = date.toISOString().slice(0, 10); // "2026-04-13"
  const dayEl = document.querySelector(`.fc-day[data-date="${iso}"]`);
  if (dayEl) dayEl.classList.add("selected-day");
}

function buildSidebar() {
  const dateStr = selectedDate.toDateString();
  const isToday = dateStr === new Date().toDateString();
  const now     = new Date();

  // Update the sidebar title to reflect which day is selected
  const title = isToday
    ? "Today's Classes"
    : selectedDate.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("sidebarTitle").textContent = title;

  // Only show classes that haven't ended yet (keeps running classes
  // visible for late walk-ins — filter by end time, not start)
  const dayClasses = allClasses
    .filter(c => activeStudios.has(c.studio) && new Date(c.start).toDateString() === dateStr)
    .filter(c => new Date(c.end) >= now)
    .sort((a, b) => new Date(a.start) - new Date(b.start));

  const list = document.getElementById("todayList");

  if (dayClasses.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🌿</div>
      <p>No classes ${isToday ? "today" : "on this day"}<br/>for selected studios.</p>
    </div>`;
    return;
  }

  list.innerHTML = dayClasses.map(cls => `
    <div class="class-card" style="border-left-color:${cls.color}" onclick="showModal(${JSON.stringify(cls).replace(/"/g, '&quot;')})">
      <div class="class-card-name">${cls.title} <span class="level-badge">${cls.level}</span></div>
      <div class="class-card-meta">
        ${formatTime(cls.start)} – ${formatTime(cls.end)} · ${cls.instructor}
      </div>
      ${cls.spots_left != null ? `<span class="class-card-spots ${cls.spots_left <= 5 ? 'few' : ''}">${cls.spots_left} spots left</span>` : ""}
    </div>
  `).join("");
}

// ── FullCalendar ───────────────────────────────────────────────────
function initCalendar() {
  const el = document.getElementById("calendar");
  calendar = new FullCalendar.Calendar(el, {
    initialView: "dayGridMonth",
    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,timeGridWeek,timeGridDay"
    },
    buttonText: {
      today: "Today",
      month: "Month",
      week:  "Week",
      day:   "Day"
    },
    height: "auto",
    dayMaxEvents: 4,       // show max 4 events per day, then "+X more" link
    moreLinkClick: "day",  // clicking "+X more" switches to day view
    events: fetchCalendarEvents,
    eventClick: ({ event, jsEvent, view }) => {
      // On mobile in month view, treat event taps as day taps — open the
      // day view instead of the class modal. This avoids the situation
      // where users trying to "view this day" accidentally hit a class
      // and get a class detail modal instead.
      if (window.innerWidth <= 768 && view.type === "dayGridMonth") {
        jsEvent.preventDefault();
        const date = new Date(event.start);
        selectDay(date);
        calendar.changeView("timeGridDay", date);
        return;
      }
      // Desktop, or any non-month mobile view: open the class detail modal
      selectDay(new Date(event.start));
      showModal(event.extendedProps.rawData);
    },
    dateClick: ({ date }) => {
      selectDay(date);
      // On mobile, clicking a day opens the full day view
      // since the sidebar is hidden
      if (window.innerWidth <= 768) {
        calendar.changeView("timeGridDay", date);
      }
    },
    datesSet: () => buildSidebar()
  });
  calendar.render();
}

function fetchCalendarEvents(info, successCallback) {
  const now = new Date();
  // Only show classes that haven't ended yet (keeps in-progress classes
  // visible for late walk-ins — filter by end time, not start time)
  const events = allClasses
    .filter(c => activeStudios.has(c.studio))
    .filter(c => new Date(c.end) >= now)
    .map(c => ({
      id:    c.id,
      title: c.title,
      start: c.start,
      end:   c.end,
      backgroundColor: c.color,
      borderColor:     c.color,
      extendedProps: { rawData: c }
    }));
  successCallback(events);
}

// ── Modal ──────────────────────────────────────────────────────────
function showModal(cls) {
  if (typeof cls === "string") cls = JSON.parse(cls);
  document.getElementById("modalColorBar").style.background = cls.color;
  document.getElementById("modalTitle").textContent = cls.title;
  document.getElementById("modalStudio").textContent = cls.studio;
  document.getElementById("modalTime").textContent =
    `${formatDate(cls.start)}  ·  ${formatTime(cls.start)} – ${formatTime(cls.end)}`;
  document.getElementById("modalInstructor").textContent = cls.instructor;
  document.getElementById("modalLevel").textContent = cls.level;

  const spotsRow = document.getElementById("modalSpotsRow");
  if (cls.spots_left != null) {
    spotsRow.style.display = "flex";
    document.getElementById("modalSpots").textContent = `${cls.spots_left} spots remaining`;
  } else {
    spotsRow.style.display = "none";
  }

  // Set the Book Now button — links to booking URL if available,
  // otherwise falls back to the studio's main Mindbody page
  const bookBtn = document.getElementById("modalBookBtn");
  const bookingUrl = cls.booking_url ||
    "https://www.mindbodyonline.com/explore/locations/victor-yoga-studio";
  bookBtn.href = bookingUrl;
  bookBtn.style.background = cls.color || "var(--clay)";

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Helpers ────────────────────────────────────────────────────────
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function openDiscovery() {
  document.getElementById("discoveryOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
  // Show built-in studios immediately, then try to load the JSON for any updates
  if (!studioDirectory.length) {
    studioDirectory = BUILTIN_STUDIOS;
    renderDirectoryStudios(studioDirectory, "Rochester, NY area");
    loadStudioDirectory(); // upgrade in background if file exists
  }
}

function closeDiscovery(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("discoveryOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ── Load curated directory ─────────────────────────────────────────
async function loadStudioDirectory() {
  try {
    const res = await fetch("studio_directory.json");
    if (!res.ok) return; // file not found — keep built-in data
    const data = await res.json();
    studioDirectory = [];
    for (const [city, studios] of Object.entries(data.cities)) {
      studios.forEach(s => studioDirectory.push({ ...s, city_label: city }));
    }
    // Silently upgrade the display if the modal is still open
    if (document.getElementById("discoveryOverlay").classList.contains("open")) {
      renderDirectoryStudios(studioDirectory, "Rochester, NY area");
    }
  } catch (err) {
    // Keep using built-in data silently
  }
}

// ── Render directory studios ───────────────────────────────────────
function renderDirectoryStudios(studios, locationLabel, searchCoords) {
  const status  = document.getElementById("discoveryStatus");
  const results = document.getElementById("studioResults");

  const live       = studios.filter(s => s.integration_status === "live");
  const comingSoon = studios.filter(s => s.integration_status === "coming_soon");

  status.innerHTML = `
    <strong>${studios.length} studios</strong> near ${locationLabel} —
    <span style="color:var(--sage)">✅ ${live.length} with live schedules</span>
    · <span style="color:var(--ink-soft)">🔄 ${comingSoon.length} coming soon</span>
  `;

  // Build the Google Maps "see more" link.
  // Find the best lat/lng to center the map on — try in this order:
  //   1. searchCoords if given (most accurate)
  //   2. The first studio's coordinates
  //   3. Rochester, NY as a last resort (since that's our service area)
  let mapsLat, mapsLng;
  if (searchCoords) {
    mapsLat = searchCoords.lat;
    mapsLng = searchCoords.lng;
  } else if (studios[0]?.lat && studios[0]?.lng) {
    mapsLat = studios[0].lat;
    mapsLng = studios[0].lng;
  } else {
    // Default to Rochester, NY (our primary service area)
    mapsLat = 43.1566;
    mapsLng = -77.6088;
  }

  const googleMapsLink = `
    <div style="margin-top:1rem; padding:1rem; background:var(--bg);
                border:1px solid var(--border); border-radius:8px; text-align:center;">
      <p style="font-size:0.8rem; color:var(--ink-mid); margin-bottom:0.5rem;">
        <strong>Looking for more studios?</strong>
      </p>
      <p style="font-size:0.75rem; color:var(--ink-soft); margin-bottom:0.75rem;">
        Our directory may not include every studio in the area.
      </p>
      <a href="https://www.google.com/maps/search/yoga/@${mapsLat},${mapsLng},13z"
         target="_blank" rel="noopener"
         style="display:inline-block; padding:0.5rem 1rem;
                background:var(--clay); color:white; text-decoration:none;
                border-radius:6px; font-size:0.8rem; font-family:var(--font-body);">
        🔍 View yoga studios on Google Maps →
      </a>
    </div>`;

  results.innerHTML = studios.map(s => renderStudioCard(s, searchCoords)).join("") + googleMapsLink;
}

// ── Filter calendar to a studio ────────────────────────────────────
function filterToStudio(studioName) {
  // Close the discovery modal
  closeDiscovery();

  // Make only this studio active in the filter pills
  activeStudios.clear();
  activeStudios.add(studioName);

  // Update pill UI
  document.querySelectorAll(".pill").forEach(pill => {

// ── Location autocomplete ──────────────────────────────────────────
// Uses Nominatim (OpenStreetMap) to suggest cities as the user types.
// Debounces keystrokes so we don't hammer the API on every keypress.
let autocompleteTimer = null;
let autocompleteHighlight = -1;
let currentSuggestions = [];

// Local cities that always show first for instant feedback
// (before the network request even completes)
const LOCAL_CITY_HINTS = [
  "Rochester, NY",
  "Pittsford, NY",
  "Fairport, NY",
  "Webster, NY",
  "Victor, NY",
  "Penfield, NY"
];

function handleLocationInput() {
  const input = document.getElementById("locationInput");
  const query = input.value.trim();

  // Hide dropdown if empty
  if (!query) {
    hideSuggestions();
    return;
  }

  const lowerQuery = query.toLowerCase();

  // Step 1a: Match directly against known studio names first
  // (so typing "Victor" instantly surfaces Victor Yoga Studio)
  const studioMatches = studioDirectory
    .filter(s => s.name.toLowerCase().includes(lowerQuery))
    .map(s => ({
      name: s.name,
      subtitle: `${s.area} · ${s.city_label}`,
      type: "studio",
      studio: s
    }));

  // Step 1b: Add local city hints that match
  const instantCityMatches = LOCAL_CITY_HINTS
    .filter(c => c.toLowerCase().includes(lowerQuery))
    .map(name => ({ name, type: "local" }));

  // Combine — studios come first, cities after
  const combined = [...studioMatches, ...instantCityMatches];
  if (combined.length) {
    renderSuggestions(combined);
  }

  // Step 2: Debounced network call for broader city suggestions
  clearTimeout(autocompleteTimer);
  autocompleteTimer = setTimeout(() => fetchLocationSuggestions(query), 250);
}

async function fetchLocationSuggestions(query) {
  if (query.length < 2) return;
  try {
    // Nominatim endpoint — limit to cities/towns/zips in the US for relevance
    const url = `https://nominatim.openstreetmap.org/search?` +
      `q=${encodeURIComponent(query)}&format=json&limit=8&addressdetails=1&countrycodes=us`;
    const res  = await fetch(url, { headers: { "Accept-Language": "en" } });
    const data = await res.json();

    // Keep only city/town/village/zip-style hits, dedupe by display name
    const seen = new Set();
    const networkHits = data
      .filter(d => {
        const type = d.type || "";
        const cls  = d.class || "";
        return (
          ["city", "town", "village", "hamlet", "administrative", "postcode"].includes(type) ||
          cls === "place" || cls === "boundary"
        );
      })
      .map(d => {
        // Build a clean "City, State" or "Zip — City, State" label
        const a = d.address || {};
        const city  = a.city || a.town || a.village || a.hamlet || a.suburb || a.county;
        const state = a.state;
        const zip   = a.postcode;
        let label;
        if (d.type === "postcode" && zip) {
          label = `${zip}${city ? " — " + city : ""}${state ? ", " + state : ""}`;
        } else if (city && state) {
          label = `${city}, ${state}`;
        } else {
          label = d.display_name.split(",").slice(0, 2).join(",").trim();
        }
        return { name: label, type: "remote" };
      })
      .filter(s => {
        if (seen.has(s.name)) return false;
        seen.add(s.name);
        return true;
      });

    // Merge local hints (top) with network hits, dedupe
    const locals = LOCAL_CITY_HINTS
      .filter(c => c.toLowerCase().includes(query.toLowerCase()))
      .map(name => ({ name, type: "local" }));

    const combined = [...locals];
    for (const hit of networkHits) {
      if (!combined.some(c => c.name.toLowerCase() === hit.name.toLowerCase())) {
        combined.push(hit);
      }
    }
    renderSuggestions(combined.slice(0, 8));
  } catch (err) {
    // Silent fail — keep whatever local hints are already showing
  }
}

function renderSuggestions(suggestions) {
  const dropdown = document.getElementById("locationSuggestions");
  currentSuggestions = suggestions;
  autocompleteHighlight = -1;

  if (!suggestions.length) {
    hideSuggestions();
    return;
  }

  dropdown.innerHTML = suggestions.map((s, i) => {
    const icon = s.type === "studio" ? "🧘"
               : s.type === "local"  ? "⭐"
               : "📍";
    const subtitle = s.subtitle
      ? `<br/><span style="font-size:0.72rem; color:var(--ink-soft);">${s.subtitle}</span>`
      : "";
    return `
      <div class="suggestion-item" data-index="${i}"
           onmousedown="selectSuggestion(${i})"
           onmouseenter="highlightSuggestion(${i})">
        <span class="suggestion-icon">${icon}</span>
        <span class="suggestion-text">${s.name}${subtitle}</span>
      </div>`;
  }).join("");
  dropdown.classList.add("open");
}

function hideSuggestions() {
  document.getElementById("locationSuggestions").classList.remove("open");
  autocompleteHighlight = -1;
}

function selectSuggestion(index) {
  const s = currentSuggestions[index];
  if (!s) return;
  document.getElementById("locationInput").value = s.name;
  hideSuggestions();

  // If they picked a studio, show just that studio highlighted
  if (s.type === "studio" && s.studio) {
    renderDirectoryStudios([s.studio], `Matched studio: ${s.name}`);
    return;
  }

  // Otherwise do the normal city/zip search flow
  searchStudios();
}

function highlightSuggestion(index) {
  autocompleteHighlight = index;
  document.querySelectorAll(".suggestion-item").forEach((el, i) => {
    el.classList.toggle("highlighted", i === index);
  });
}

function handleLocationKeydown(e) {
  const open = document.getElementById("locationSuggestions").classList.contains("open");

  if (e.key === "Enter") {
    if (open && autocompleteHighlight >= 0) {
      e.preventDefault();
      selectSuggestion(autocompleteHighlight);
    } else {
      searchStudios();
    }
    return;
  }
  if (!open) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    highlightSuggestion(Math.min(autocompleteHighlight + 1, currentSuggestions.length - 1));
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    highlightSuggestion(Math.max(autocompleteHighlight - 1, 0));
  } else if (e.key === "Escape") {
    hideSuggestions();
  }
}

// ── OSM search for other cities ────────────────────────────────────
async function searchStudios() {
  const location = document.getElementById("locationInput").value.trim();
  const radius   = document.getElementById("radiusSelect").value;
  if (!location) {
    document.getElementById("discoveryStatus").textContent = "Please enter a location first.";
    return;
  }

  const lowerQuery = location.toLowerCase();

  // Step 0: Try matching against studio names first
  // (so "Victor Yoga" typed and Enter'd goes straight to that studio)
  const studioHits = studioDirectory.filter(s =>
    s.name.toLowerCase().includes(lowerQuery) ||
    lowerQuery.includes(s.name.toLowerCase())
  );
  if (studioHits.length > 0) {
    renderDirectoryStudios(
      studioHits,
      studioHits.length === 1
        ? `Matched studio: ${studioHits[0].name}`
        : `Studios matching "${location}"`
    );
    return;
  }

  // Step 1: Direct city name match against directory
  const cityMatch = studioDirectory.filter(s =>
    s.city_label.toLowerCase().includes(lowerQuery) ||
    lowerQuery.includes(s.city_label.split(",")[0].toLowerCase())
  );
  if (cityMatch.length > 0) {
    renderDirectoryStudios(cityMatch, location);
    return;
  }

  // Step 2: Geocode the input to get real coordinates and city name
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("studioResults").innerHTML = "";
  document.getElementById("discoveryStatus").textContent = `🔍 Looking up "${location}"…`;

  let lat, lng, displayName, fullName;
  try {
    const geoRes = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1&addressdetails=1`,
      { headers: { "Accept-Language": "en" } }
    );
    const geoData = await geoRes.json();
    if (!geoData.length) {
      document.getElementById("discoveryStatus").textContent =
        `Could not find "${location}". Try a format like "Buffalo, NY" or "14604".`;
      document.getElementById("searchBtn").disabled = false;
      return;
    }
    lat         = parseFloat(geoData[0].lat);
    lng         = parseFloat(geoData[0].lon);
    displayName = geoData[0].display_name.split(",").slice(0, 2).join(",").trim();
    fullName    = geoData[0].display_name.toLowerCase();
  } catch (err) {
    document.getElementById("discoveryStatus").textContent = "Geocoding failed — " + err.message;
    document.getElementById("searchBtn").disabled = false;
    return;
  }

  // Step 3: Check if the geocoded location is near a city in our directory.
  // Compute distance between geocoded point and each known city.
  // If within ~40 miles, show the directory for that city instead of OSM.
  const KNOWN_CITY_COORDS = {
    "Rochester, NY": { lat: 43.1566, lng: -77.6088 }
    // Add more cities here as the app expands
  };

  function milesApart(lat1, lng1, lat2, lng2) {
    const R = 3958.8; // Earth radius in miles
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  for (const [cityLabel, coords] of Object.entries(KNOWN_CITY_COORDS)) {
    const dist = milesApart(lat, lng, coords.lat, coords.lng);
    if (dist <= 40) {
      const cityStudios = studioDirectory.filter(s => s.city_label === cityLabel);
      const searchCoords = { lat, lng };
      renderDirectoryStudios(
        cityStudios,
        `${displayName} (${Math.round(dist)} mi from ${cityLabel})`,
        searchCoords
      );
      document.getElementById("searchBtn").disabled = false;
      return;
    }
  }

  // Step 4: Truly unknown location — try OSM/Overpass
  document.getElementById("discoveryStatus").textContent =
    `📍 ${displayName} — searching for yoga studios…`;

  try {
    const radiusM = radius * 1609;
    // Cast a wide net but score-filter results below.
    // We pull anything that might be yoga-adjacent, then rank by relevance.
    const query = `
      [out:json][timeout:30];
      (
        node["sport"="yoga"](around:${radiusM},${lat},${lng});
        way["sport"="yoga"](around:${radiusM},${lat},${lng});
        node["leisure"="fitness_centre"](around:${radiusM},${lat},${lng});
        way["leisure"="fitness_centre"](around:${radiusM},${lat},${lng});
        node["amenity"="studio"](around:${radiusM},${lat},${lng});
        way["amenity"="studio"](around:${radiusM},${lat},${lng});
        node["name"~"yoga|pilates|barre|meditation|mindful|breathe",i](around:${radiusM},${lat},${lng});
        way["name"~"yoga|pilates|barre|meditation|mindful|breathe",i](around:${radiusM},${lat},${lng});
      );
      out body center;
    `;
    const ovRes  = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(query)
    });
    if (!ovRes.ok) throw new Error(`Overpass error ${ovRes.status}`);
    const ovData = await ovRes.json();

    // Score each result for "is this actually a yoga studio?"
    // Higher score = more likely to be relevant. We reject anything below 1.
    const GYM_BLOCKLIST = [
      "planet fitness","anytime fitness","crossfit","la fitness","gold's gym",
      "ymca","retro fitness","blink fitness","equinox","orange theory","orangetheory",
      "f45","9round","snap fitness","lifetime","life time","powerhouse gym",
      "world gym","24 hour fitness","esporta","fitness 19"
    ];

    function scoreStudio(t) {
      const name = (t.name || "").toLowerCase();
      let score = 0;

      // Strong yoga signals
      if (t.sport === "yoga") score += 10;
      if (/\byoga\b/.test(name)) score += 5;
      if (/\bpilates\b/.test(name)) score += 3;
      if (/\bbarre\b/.test(name)) score += 3;
      if (/\bmeditation\b/.test(name)) score += 2;
      if (/\bmindful/.test(name)) score += 2;
      if (/\bbreathe\b/.test(name)) score += 2;
      if (/\bzen\b/.test(name)) score += 1;
      if (/\bflow\b/.test(name)) score += 1;
      if (/\blotus\b/.test(name)) score += 1;
      if (/\bnamaste\b/.test(name)) score += 1;

      // Soft signals
      if (t.leisure === "fitness_centre" && score === 0) score += 0.5;
      if (t.amenity === "studio") score += 1;

      // Reject big-box gyms
      for (const blocked of GYM_BLOCKLIST) {
        if (name.includes(blocked)) return 0;
      }
      return score;
    }

    const seen = new Set();
    const osmStudios = ovData.elements
      .filter(el => el.tags?.name)
      .map(el => ({ ...el, _score: scoreStudio(el.tags) }))
      .filter(el => el._score >= 1)
      .filter(el => {
        const key = el.tags.name.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      })
      .sort((a, b) => b._score - a._score)
      .map(el => {
        const t = el.tags;
        // Capture coords so we can show distance from search location
        const coords = el.lat && el.lon
          ? { lat: el.lat, lng: el.lon }
          : el.center
            ? { lat: el.center.lat, lng: el.center.lon }
            : null;
        return {
          name: t.name,
          area: [t["addr:city"], t["addr:state"]].filter(Boolean).join(", ") || displayName,
          address: [t["addr:housenumber"], t["addr:street"]].filter(Boolean).join(" "),
          phone: t.phone || t["contact:phone"] || "",
          website: t.website || t["contact:website"] || "",
          platform: "Unknown",
          mindbody_url: "",
          integration_status: "not_integrated",
          color: "#888",
          description: t.opening_hours ? `Hours: ${t.opening_hours}` : "",
          specialties: [],
          lat: coords?.lat,
          lng: coords?.lng
        };
      });

    if (!osmStudios.length) {
      document.getElementById("discoveryStatus").textContent = "";
      document.getElementById("studioResults").innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🗺️</div>
          <p>No studios found in our map data near ${displayName}.<br/><br/>
          <strong>Try a wider search:</strong><br/>
          <a href="https://www.google.com/maps/search/yoga/@${lat},${lng},13z"
             target="_blank" rel="noopener"
             style="color:var(--clay); font-weight:500;">
            🔍 View yoga studios on Google Maps →
          </a>
          <br/><br/>
          <span style="font-size:0.78rem; color:var(--ink-soft);">
            Find a studio you love? Use the button below to request we add it.
          </span></p>
        </div>`;
    } else {
      renderOsmStudios(osmStudios, displayName, lat, lng);
    }
  } catch (err) {
    document.getElementById("discoveryStatus").textContent =
      "Search failed — " + err.message;
  } finally {
    document.getElementById("searchBtn").disabled = false;
  }
}

// ── Render OSM studios (for non-curated cities) ────────────────────
function renderOsmStudios(studios, locationLabel, lat, lng) {
  const status  = document.getElementById("discoveryStatus");
  const results = document.getElementById("studioResults");

  status.innerHTML = `Found <strong>${studios.length} studios</strong> near ${locationLabel}.
    <span style="color:var(--ink-soft); font-size:0.78rem;">
      Schedules for these studios are not yet integrated —
      submit a request below to add them!
    </span>`;

  const googleMapsUrl = `https://www.google.com/maps/search/yoga/@${lat},${lng},13z`;

  results.innerHTML = studios.map(s => `
    <div class="studio-result-card" style="grid-template-columns:1fr auto;">
      <div>
        <div class="studio-result-name">${s.name}</div>
        <div class="studio-result-meta">
          📍 ${s.area}${s.address ? ` · ${s.address}` : ""}
          ${s.phone ? `<br/>📞 ${s.phone}` : ""}
          ${s.website ? `<br/>🌐 <a href="${s.website}" target="_blank" style="color:var(--clay)">${s.website.replace(/^https?:\/\//, "")}</a>` : ""}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; justify-content:center;">
        <span class="studio-platform-badge badge-unknown">Not Integrated</span>
        <button onclick="requestStudio('${s.name.replace(/'/g, "\\'")}', '${s.website}')"
                style="padding:0.35rem 0.75rem; background:transparent;
                       border:1px solid var(--clay); color:var(--clay);
                       border-radius:6px; font-size:0.72rem; cursor:pointer;
                       font-family:var(--font-body);">
          Request →
        </button>
      </div>
    </div>`).join("") + `
    <div style="margin-top:1rem; padding:1rem; background:var(--bg);
                border:1px solid var(--border); border-radius:8px; text-align:center;">
      <p style="font-size:0.8rem; color:var(--ink-mid); margin-bottom:0.5rem;">
        <strong>Looking for more studios?</strong>
      </p>
      <p style="font-size:0.75rem; color:var(--ink-soft); margin-bottom:0.75rem;">
        Our map data may not include every studio in the area.
      </p>
      <a href="${googleMapsUrl}" target="_blank" rel="noopener"
         style="display:inline-block; padding:0.5rem 1rem;
                background:var(--clay); color:white; text-decoration:none;
                border-radius:6px; font-size:0.8rem; font-family:var(--font-body);">
        🔍 View yoga studios on Google Maps →
      </a>
    </div>`;
}

// ── Notify me ─────────────────────────────────────────────────────
function notifyMe(studioName) {
  const subject = encodeURIComponent(`Schedule Request: ${studioName}`);
  const body    = encodeURIComponent(
    `Hi,\n\nI'd love to see ${studioName}'s class schedule added to the Yo-Go — Local Yoga Calendar!\n\nThanks`
  );
  // Replace this email with your own
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}

// ── Request a studio from OSM results ─────────────────────────────
function requestStudio(name, website) {
  const subject = encodeURIComponent(`Studio Integration Request: ${name}`);
  const body    = encodeURIComponent(
    `Hi,\n\nI'd like to request that ${name} be added to the Yo-Go — Local Yoga Calendar.\n\nWebsite: ${website || 'N/A'}\n\nThanks!`
  );
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}

// ── Request a new studio (generic) ────────────────────────────────
function requestNewStudio() {
  const subject = encodeURIComponent("New Studio Integration Request");
  const body    = encodeURIComponent(
    `Hi,\n\nI'd like to request a yoga studio be added to the Yo-Go — Local Yoga Calendar.\n\nStudio name:\nWebsite:\nLocation:\n\nThanks!`
  );
  window.open(`mailto:your-email@example.com?subject=${subject}&body=${body}`);
}
</script>
</body>
