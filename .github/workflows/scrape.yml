name: Scrape Yoga Schedules

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python mindbody_playwright_scraper.py

      - name: Commit updated schedule data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule_data.json
          git diff --staged --quiet || git commit -m "chore: update schedule data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
